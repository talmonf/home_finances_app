# Dependency audit and production build on every push/PR.
# Triage `npm audit` findings regularly; some transitive issues require upstream fixes.
name: Security CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  audit-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high severity)
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Production build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
          NEXTAUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
          NEXTAUTH_URL: http://localhost:3000
